<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Music Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .music-player {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .badge {
            text-align: center;
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 30px;
        }

        .cover {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        .song-title {
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            margin: 15px 0 5px;
            color: #333;
        }

        .song-artist {
            text-align: center;
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .progress-container {
            background: #e0e0e0;
            border-radius: 10px;
            height: 6px;
            cursor: pointer;
            margin: 20px 0;
        }

        .progress {
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #888;
            margin-top: -15px;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
        }

        .controls button {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            transition: transform 0.2s;
            color: #1a1a2e;
        }

        .controls button:hover {
            transform: scale(1.1);
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            justify-content: center;
        }

        .volume-control input {
            width: 100px;
        }

        .playlist {
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
            max-height: 250px;
            overflow-y: auto;
        }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .playlist-item:hover {
            background: #f0f0f0;
        }

        .playlist-item.active {
            background: linear-gradient(135deg, #667eea22, #764ba222);
        }

        .playlist-title {
            font-size: 0.9rem;
            color: #333;
        }

        .playlist-artist {
            font-size: 0.75rem;
            color: #888;
        }

        .playlist-duration {
            font-size: 0.7rem;
            color: #aaa;
            font-family: monospace;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #aaa;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .playing-animation {
            animation: pulse 1s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="music-player">
        <h1>🎵 Cloud Music</h1>
        <div class="badge">Hébergé sur Cloud Run ☁️</div>

        <div class="cover" id="cover">🎵</div>
        <div class="song-title" id="title">Sélectionnez une chanson</div>
        <div class="song-artist" id="artist">—</div>

        <div class="progress-container" id="progressContainer">
            <div class="progress" id="progress"></div>
        </div>
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>

        <div class="controls">
            <button id="prevBtn">⏮️</button>
            <button id="playBtn">▶️</button>
            <button id="nextBtn">⏭️</button>
        </div>

        <div class="volume-control">
            <span>🔊</span>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7">
            <span id="volumeValue">70%</span>
        </div>

        <div class="playlist" id="playlist"></div>
        <footer>Déployé sur Google Cloud Run • Lecteur de démonstration</footer>
    </div>

    <script>
        // Playlist avec durées en SECONDES pour calcul précis
        const playlist = [
            { title: "Midnight Dreams", artist: "Electra", durationSec: 184, durationStr: "3:04", emoji: "🌙" },
            { title: "Golden Hour", artist: "Aurora", durationSec: 211, durationStr: "3:31", emoji: "☀️" },
            { title: "Neon Lights", artist: "Pixel", durationSec: 198, durationStr: "3:18", emoji: "💡" },
            { title: "Ocean Drive", artist: "Wave", durationSec: 223, durationStr: "3:43", emoji: "🌊" },
            { title: "Starlight", artist: "Cosmo", durationSec: 175, durationStr: "2:55", emoji: "⭐" }
        ];

        let currentSongIndex = 0;
        let isPlaying = false;
        let progressInterval = null;
        let currentSeconds = 0;  // secondes écoulées
        let songDuration = playlist[0].durationSec;

        // Helper: formater secondes en MM:SS
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Mettre à jour l'affichage du temps et de la barre
        function updateTimeDisplay() {
            document.getElementById('currentTime').textContent = formatTime(currentSeconds);
            const percent = (currentSeconds / songDuration) * 100;
            document.getElementById('progress').style.width = `${percent}%`;
        }

        // Arrêter la progression
        function stopProgress() {
            if (progressInterval) {
                clearInterval(progressInterval);
                progressInterval = null;
            }
        }

        // Démarrer la progression (avec intervalle de 0.1s pour être fluide)
        function startProgress() {
            if (progressInterval) stopProgress();
            
            progressInterval = setInterval(() => {
                if (isPlaying && currentSeconds < songDuration) {
                    currentSeconds += 0.1;
                    updateTimeDisplay();
                    
                    // Fin de la chanson
                    if (currentSeconds >= songDuration) {
                        currentSeconds = songDuration;
                        updateTimeDisplay();
                        nextSong();
                    }
                }
            }, 100);
        }

        // Charger une chanson
        function loadSong(index) {
            // Arrêter la lecture en cours
            if (isPlaying) {
                isPlaying = false;
                document.getElementById('playBtn').textContent = '▶️';
                stopProgress();
            }
            
            currentSongIndex = index;
            const song = playlist[currentSongIndex];
            songDuration = song.durationSec;
            currentSeconds = 0;
            
            document.getElementById('title').textContent = song.title;
            document.getElementById('artist').textContent = song.artist;
            document.getElementById('duration').textContent = song.durationStr;
            document.getElementById('cover').textContent = song.emoji;
            
            updateTimeDisplay();
            updatePlaylistUI();
            
            // Enlever l'animation de lecture
            document.getElementById('cover').classList.remove('playing-animation');
        }

        // Jouer ou mettre en pause
        function togglePlay() {
            isPlaying = !isPlaying;
            const playBtn = document.getElementById('playBtn');
            const cover = document.getElementById('cover');
            
            if (isPlaying) {
                playBtn.textContent = '⏸️';
                cover.classList.add('playing-animation');
                
                // Si on est à la fin, recommencer
                if (currentSeconds >= songDuration) {
                    currentSeconds = 0;
                    updateTimeDisplay();
                }
                startProgress();
            } else {
                playBtn.textContent = '▶️';
                cover.classList.remove('playing-animation');
                stopProgress();
            }
        }

        // Chanson suivante
        function nextSong() {
            const newIndex = (currentSongIndex + 1) % playlist.length;
            loadSong(newIndex);
            if (isPlaying) {
                isPlaying = false;
                togglePlay();
            }
        }

        // Chanson précédente
        function prevSong() {
            const newIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
            loadSong(newIndex);
            if (isPlaying) {
                isPlaying = false;
                togglePlay();
            }
        }

        // Mettre à jour l'affichage de la playlist
        function updatePlaylistUI() {
            const container = document.getElementById('playlist');
            container.innerHTML = '';
            playlist.forEach((song, index) => {
                const div = document.createElement('div');
                div.className = `playlist-item ${index === currentSongIndex ? 'active' : ''}`;
                div.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="font-size: 1.5rem;">${song.emoji}</span>
                        <div>
                            <div class="playlist-title">${song.title}</div>
                            <div class="playlist-artist">${song.artist}</div>
                        </div>
                    </div>
                    <div class="playlist-duration">${song.durationStr}</div>
                `;
                div.onclick = () => {
                    if (isPlaying) {
                        isPlaying = false;
                        document.getElementById('playBtn').textContent = '▶️';
                        stopProgress();
                        document.getElementById('cover').classList.remove('playing-animation');
                    }
                    loadSong(index);
                };
                container.appendChild(div);
            });
        }

        // Barre de progression cliquable
        function setupProgressBar() {
            const container = document.getElementById('progressContainer');
            container.addEventListener('click', (e) => {
                const rect = container.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const width = rect.width;
                const percent = Math.min(1, Math.max(0, x / width));
                currentSeconds = percent * songDuration;
                updateTimeDisplay();
            });
        }

        // Contrôle du volume (affichage)
        function setupVolume() {
            const volumeSlider = document.getElementById('volume');
            const volumeValue = document.getElementById('volumeValue');
            volumeSlider.addEventListener('input', (e) => {
                const val = Math.round(e.target.value * 100);
                volumeValue.textContent = `${val}%`;
            });
        }

        // Initialisation
        function init() {
            loadSong(0);
            setupProgressBar();
            setupVolume();
            
            document.getElementById('playBtn').onclick = togglePlay;
            document.getElementById('nextBtn').onclick = nextSong;
            document.getElementById('prevBtn').onclick = prevSong;
        }

        init();
    </script>
</body>
</html>
